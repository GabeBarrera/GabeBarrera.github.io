// ─── Matrix rain ───────────────────────────────────────────────
function MatrixRain({ enabled, hue }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!enabled) return;
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let raf, cols, drops, fontSize;
    const resize = () => {
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.offsetWidth * dpr;
      canvas.height = canvas.offsetHeight * dpr;
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      fontSize = 14;
      cols = Math.floor(canvas.offsetWidth / fontSize);
      drops = Array(cols).fill(0).map(() => Math.random() * -100);
    };
    resize();
    window.addEventListener('resize', resize);
    const glyphs = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロヲゴゾドボポ0123456789ABCDEF{}<>[]/$#@!?*';
    const draw = () => {
      ctx.fillStyle = 'rgba(6, 4, 12, 0.08)';
      ctx.fillRect(0, 0, canvas.offsetWidth, canvas.offsetHeight);
      ctx.font = `${fontSize}px "JetBrains Mono", monospace`;
      for (let i = 0; i < cols; i++) {
        const ch = glyphs[Math.floor(Math.random() * glyphs.length)];
        const x = i * fontSize;
        const y = drops[i] * fontSize;
        ctx.fillStyle = `oklch(0.92 0.18 ${hue})`;
        ctx.fillText(ch, x, y);
        ctx.fillStyle = `oklch(0.6 0.2 ${hue} / 0.6)`;
        ctx.fillText(ch, x, y - fontSize);
        if (y > canvas.offsetHeight && Math.random() > 0.975) drops[i] = 0;
        drops[i] += 0.4;
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', resize);
    };
  }, [enabled, hue]);
  if (!enabled) return null;
  return <canvas ref={ref} className="matrix-rain" />;
}

// ─── Glitch text ───────────────────────────────────────────────
function GlitchText({ text, className = '' }) {
  return (
    <span className={`glitch-text ${className}`} data-text={text}>{text}</span>
  );
}

// ─── Typewriter ────────────────────────────────────────────────
function Typewriter({ phrases, speed = 70, pause = 1400 }) {
  const [i, setI] = useState(0);
  const [text, setText] = useState('');
  const [del, setDel] = useState(false);
  useEffect(() => {
    const cur = phrases[i];
    let t;
    if (!del && text.length < cur.length) {
      t = setTimeout(() => setText(cur.slice(0, text.length + 1)), speed);
    } else if (!del && text.length === cur.length) {
      t = setTimeout(() => setDel(true), pause);
    } else if (del && text.length > 0) {
      t = setTimeout(() => setText(cur.slice(0, text.length - 1)), speed / 2);
    } else if (del && text.length === 0) {
      setDel(false);
      setI((i + 1) % phrases.length);
    }
    return () => clearTimeout(t);
  }, [text, del, i, phrases, speed, pause]);
  return (
    <span className="typewriter">
      <span>{text}</span>
      <span className="caret">█</span>
    </span>
  );
}

// ─── System status ─────────────────────────────────────────────
function SystemStatus() {
  const [time, setTime] = useState(new Date());
  const [ping, setPing] = useState(12);
  const [load, setLoad] = useState(0.34);
  useEffect(() => {
    const t = setInterval(() => {
      setTime(new Date());
      setPing(Math.floor(8 + Math.random() * 18));
      setLoad(0.2 + Math.random() * 0.5);
    }, 1500);
    return () => clearInterval(t);
  }, []);
  const uptimeRef = useRef(Date.now());
  const up = Math.floor((Date.now() - uptimeRef.current) / 1000);
  const fmt = (n) => String(n).padStart(2, '0');
  return (
    <div className="status">
      <div className="status-row"><span className="status-dot" /><span>SECURE_CHANNEL</span></div>
      <div className="status-row"><span className="status-k">UTC</span><span>{fmt(time.getUTCHours())}:{fmt(time.getUTCMinutes())}:{fmt(time.getUTCSeconds())}</span></div>
      <div className="status-row"><span className="status-k">PING</span><span>{ping}ms</span></div>
      <div className="status-row"><span className="status-k">LOAD</span><span>{(load * 100).toFixed(1)}%</span></div>
      <div className="status-row"><span className="status-k">UP</span><span>{Math.floor(up / 60)}m {up % 60}s</span></div>
    </div>
  );
}
