<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 // NOT FOUND</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    :root {
      --cyan:    #00fff2;
      --magenta: #ff00c8;
      --yellow:  #ffe600;
      --red:     #ff3355;
      --bg:      #07070f;
      --bg2:     #0c0c1a;
      --text:    #b8c8ff;
      --dim:     #3a3a60;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background-image:
        linear-gradient(rgba(0,255,242,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,242,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
    }

    /* ── SCAN LINE ── */
    .scan-line {
      position: fixed; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.3;
      animation: scan 4s linear infinite;
      pointer-events: none;
    }
    @keyframes scan { 0% { top: 0; } 100% { top: 100vh; } }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      opacity: 0.4;
    }

    /* ── MAIN ── */
    .container {
      text-align: center;
      padding: 20px;
      position: relative;
      z-index: 1;
    }

    /* ── 404 BIG NUMBER ── */
    .code-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 10px;
    }

    .error-code {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(6rem, 22vw, 14rem);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 2px var(--red);
      text-shadow:
        0 0 20px rgba(255,51,85,0.4),
        0 0 60px rgba(255,51,85,0.15);
      letter-spacing: 0.05em;
      line-height: 1;
      animation: flicker 6s infinite;
      user-select: none;
    }

    /* glitch layers */
    .error-code::before,
    .error-code::after {
      content: '404';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      -webkit-text-stroke: 2px var(--red);
      color: transparent;
    }
    .error-code::before {
      color: var(--magenta);
      -webkit-text-stroke: 0;
      opacity: 0;
      animation: glitch-a 4s infinite;
      clip-path: polygon(0 20%, 100% 20%, 100% 45%, 0 45%);
    }
    .error-code::after {
      color: var(--cyan);
      -webkit-text-stroke: 0;
      opacity: 0;
      animation: glitch-b 4s infinite;
      clip-path: polygon(0 60%, 100% 60%, 100% 80%, 0 80%);
    }

    @keyframes flicker {
      0%,19%,21%,23%,25%,54%,56%,100% { opacity: 1; }
      20%,22%,24%,55% { opacity: 0.6; }
    }
    @keyframes glitch-a {
      0%,85%,100% { opacity: 0; transform: translate(0); }
      87% { opacity: 0.9; transform: translate(-4px, 2px); }
      89% { opacity: 0.9; transform: translate(4px,-2px); }
      91% { opacity: 0; }
    }
    @keyframes glitch-b {
      0%,88%,100% { opacity: 0; transform: translate(0); }
      90% { opacity: 0.9; transform: translate(5px, 1px); }
      92% { opacity: 0.9; transform: translate(-5px,-1px); }
      94% { opacity: 0; }
    }

    /* ── BADGE ── */
    .badge {
      display: inline-block;
      border: 1px solid var(--red);
      color: var(--red);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      padding: 4px 14px;
      margin-bottom: 22px;
      text-shadow: 0 0 8px var(--red);
      box-shadow: 0 0 10px rgba(255,51,85,0.2);
      animation: badgePulse 2s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%,100% { box-shadow: 0 0 10px rgba(255,51,85,0.2); }
      50%      { box-shadow: 0 0 20px rgba(255,51,85,0.5); }
    }

    /* ── HEADLINE ── */
    h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 3.5vw, 1.6rem);
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 10px rgba(0,255,242,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    /* ── TERMINAL BLOCK ── */
    .terminal {
      background: var(--bg2);
      border: 1px solid var(--dim);
      border-left: 3px solid var(--magenta);
      border-radius: 2px;
      padding: 16px 22px;
      margin: 20px auto;
      max-width: 480px;
      text-align: left;
      font-size: 0.82rem;
      line-height: 1.8;
    }
    .terminal .prompt { color: var(--magenta); }
    .terminal .path   { color: var(--yellow); }
    .terminal .cmd    { color: var(--cyan); }
    .terminal .out    { color: var(--dim); }
    .terminal .err    { color: var(--red); }

    .cursor {
      display: inline-block;
      width: 9px; height: 1.1em;
      background: var(--cyan);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
      box-shadow: 0 0 6px var(--cyan);
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

    /* ── SUBTEXT ── */
    .subtext {
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      margin-bottom: 28px;
    }

    /* ── BACK BUTTON ── */
    .btn-home {
      display: inline-block;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      padding: 12px 32px;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
      border-radius: 2px;
    }
    .btn-home:hover {
      background: rgba(0,255,242,0.1);
      box-shadow: 0 0 16px rgba(0,255,242,0.35);
    }

    /* ── CORNER DECORATIONS ── */
    .corners {
      position: fixed;
      inset: 16px;
      pointer-events: none;
    }
    .c {
      position: absolute;
      width: 20px; height: 20px;
      border-color: var(--dim);
      border-style: solid;
      opacity: 0.5;
    }
    .c.tl { top:0; left:0;   border-width: 2px 0 0 2px; }
    .c.tr { top:0; right:0;  border-width: 2px 2px 0 0; }
    .c.bl { bottom:0; left:0;  border-width: 0 0 2px 2px; }
    .c.br { bottom:0; right:0; border-width: 0 2px 2px 0; }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      width: 240px;
      background: linear-gradient(90deg, transparent, var(--magenta), transparent);
      margin: 16px auto 20px;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="scan-line"></div>

<div class="corners">
  <div class="c tl"></div>
  <div class="c tr"></div>
  <div class="c bl"></div>
  <div class="c br"></div>
</div>

<div class="container">

  <div class="badge">ERROR // SIGNAL LOST</div>

  <div class="code-wrap">
    <div class="error-code">404</div>
  </div>

  <h1>Page Not Found</h1>
  <div class="divider"></div>

  <div class="terminal">
    <div><span class="prompt">❯</span> <span class="cmd">locate</span> <span class="path">"<span id="badPath"></span>"</span></div>
    <div class="err">ERROR: No such file or directory</div>
    <div class="out">exit code 1 — path does not exist in this sector</div>
    <div style="margin-top:8px"><span class="prompt">❯</span> <span class="cursor"></span></div>
  </div>

  <p class="subtext">The node you requested has been moved, deleted, or never existed.</p>

  <a class="btn-home" href="/">&#8592; Return to Base</a>

</div>

<script>
  // Show the bad path in the terminal line
  const el = document.getElementById('badPath');
  el.textContent = window.location.pathname;
</script>

</body>
</html>
