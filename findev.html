<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FinDev - Expense Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 20px;
      color: #f8fafc;
    }

    h1 span { color: #60a5fa; }

    .wrapper {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 1200px;
    }

    .panel {
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 20px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #94a3b8;
    }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-bar input[type="date"] {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.85rem;
      padding: 6px 10px;
      outline: none;
      transition: border-color 0.15s;
      width: auto;
    }

    .filter-bar input[type="date"]:focus { border-color: #60a5fa; }

    .filter-divider {
      width: 1px;
      height: 20px;
      background: #2d3148;
    }

    .filter-btn {
      background: #252840;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 5px 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
      width: auto;
      margin: 0;
    }

    .filter-btn:hover { background: #2d3148; color: #e2e8f0; opacity: 1; }

    .filter-btn.active {
      background: #3b4fd4;
      border-color: #3b4fd4;
      color: #fff;
    }

    /* ── Chart ── */
    .chart-wrapper {
      position: relative;
      height: 360px;
    }

    .empty-state {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #475569;
      font-size: 0.9rem;
      pointer-events: none;
    }

    /* ── Expense list panel ── */
    .expense-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .total-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #0f1117;
      border-radius: 8px;
      padding: 10px 16px;
      border: 1px solid #2d3148;
      flex: 1;
      min-width: 140px;
    }

    .total-bar .lbl { font-size: 0.78rem; color: #94a3b8; }

    .total-bar .amount {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .under { color: #4ade80; }
    .over  { color: #f87171; }

    .expense-list {
      list-style: none;
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #2d3148 transparent;
    }

    .expense-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.875rem;
      gap: 8px;
    }

    .expense-list li:hover { background: #252840; }

    .expense-list .date-lbl { color: #64748b; font-size: 0.78rem; white-space: nowrap; }
    .expense-list .desc {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #cbd5e1;
    }

    .expense-list .amt { color: #f87171; font-weight: 600; white-space: nowrap; }

    .expense-list .del-btn {
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 4px;
      margin: 0;
      width: auto;
      line-height: 1;
      transition: color 0.15s;
    }

    .expense-list .del-btn:hover { color: #f87171; opacity: 1; }

    /* ── Bottom row ── */
    .bottom-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 640px) {
      .bottom-row { grid-template-columns: 1fr; }
      .filter-bar { gap: 6px; }
    }

    /* ── Form elements in bottom panels ── */
    .bottom-row label {
      display: block;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .bottom-row label:first-of-type { margin-top: 0; }

    .bottom-row input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .bottom-row input:focus { border-color: #60a5fa; }

    .btn-add {
      display: block;
      width: 100%;
      margin-top: 14px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #3b82f6;
      color: #fff;
      transition: opacity 0.15s;
    }

    .btn-add:hover { opacity: 0.85; }

    .btn-target {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      background: #334155;
      color: #e2e8f0;
      transition: opacity 0.15s;
    }

    .btn-target:hover { opacity: 0.85; }

    .target-display {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #94a3b8;
    }

    .target-display strong { color: #e2e8f0; }
  </style>
</head>
<body>

<h1>Fin<span>Dev</span></h1>

<div class="wrapper">

  <!-- 1. Graph panel (full width, top) -->
  <div class="panel">
    <div class="panel-header">
      <h2>Spending Over Time</h2>
      <div class="filter-bar">
        <input type="date" id="filterStart" onchange="onStartDateChange()" />
        <div class="filter-divider"></div>
        <button class="filter-btn" id="btn-week"  onclick="applyFilter('week')">Week</button>
        <button class="filter-btn" id="btn-month" onclick="applyFilter('month')">Month</button>
        <button class="filter-btn" id="btn-year"  onclick="applyFilter('year')">Year</button>
        <button class="filter-btn" id="btn-ytd"   onclick="applyFilter('ytd')">YTD</button>
        <button class="filter-btn active" id="btn-all" onclick="applyFilter('all')">All</button>
      </div>
    </div>
    <div class="chart-wrapper">
      <canvas id="spendingChart"></canvas>
      <div class="empty-state" id="emptyState">Add expenses to see the graph.</div>
    </div>
  </div>

  <!-- 2. Expenses panel (full width, below graph) -->
  <div class="panel">
    <div class="panel-header">
      <h2>Expenses</h2>
    </div>
    <div class="expense-controls">
      <div class="total-bar">
        <span class="lbl">Shown Total</span>
        <span class="amount under" id="totalDisplay">$0.00</span>
      </div>
    </div>
    <ul class="expense-list" id="expenseList">
      <li style="color:#475569; font-size:0.85rem;">No expenses yet.</li>
    </ul>
  </div>

  <!-- 3. Bottom row: Add Expense + Target -->
  <div class="bottom-row">

    <div class="panel">
      <h2 style="font-size:0.85rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;margin-bottom:16px;">Add Expense</h2>

      <label for="desc">Description</label>
      <input id="desc" type="text" placeholder="e.g. Groceries" />

      <label for="amount">Amount ($)</label>
      <input id="amount" type="number" min="0" step="0.01" placeholder="0.00" />

      <label for="expDate">Date</label>
      <input id="expDate" type="date" />

      <button class="btn-add" onclick="addExpense()">+ Add Expense</button>
    </div>

    <div class="panel">
      <h2 style="font-size:0.85rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#94a3b8;margin-bottom:16px;">Spending Target</h2>

      <label for="targetInput">Target Amount ($)</label>
      <input id="targetInput" type="number" min="0" step="1" placeholder="e.g. 1000" />
      <button class="btn-target" onclick="setTarget()">Set Target</button>

      <div class="target-display" id="targetDisplay">No target set.</div>
    </div>

  </div>

</div><!-- /.wrapper -->

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let expenses  = JSON.parse(localStorage.getItem('findev_expenses') || '[]');
  let target    = parseFloat(localStorage.getItem('findev_target') || '0');
  let activeFilter = 'all';   // 'week' | 'month' | 'year' | 'ytd' | 'all'
  let filterStartISO = '';    // ISO date string used as the window start

  // ── Chart setup ───────────────────────────────────────────────────────────
  const ctx = document.getElementById('spendingChart').getContext('2d');
  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: 'Cumulative Spending ($)',
        data: [],
        borderColor: '#4ade80',
        backgroundColor: 'rgba(74,222,128,0.08)',
        borderWidth: 2.5,
        pointBackgroundColor: '#4ade80',
        pointRadius: 5,
        pointHoverRadius: 7,
        fill: true,
        tension: 0.35,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: c => ' $' + c.parsed.y.toFixed(2)
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#64748b', maxRotation: 45 },
          grid:  { color: '#1e2a3a' }
        },
        y: {
          beginAtZero: true,
          ticks: {
            color: '#64748b',
            callback: v => '$' + v.toLocaleString()
          },
          grid: { color: '#1e2a3a' }
        }
      }
    }
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem('findev_expenses', JSON.stringify(expenses));
    localStorage.setItem('findev_target',   String(target));
  }

  function todayISO() {
    return new Date().toISOString().split('T')[0];
  }

  function addDays(iso, n) {
    const d = new Date(iso + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return d.toISOString().split('T')[0];
  }

  function fmtDate(iso) {
    const [, m, d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return months[parseInt(m, 10) - 1] + ' ' + parseInt(d, 10);
  }

  function escHtml(str) {
    return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── Filter logic ───────────────────────────────────────────────────────────
  // Returns { start: ISO, end: ISO } for the current filter + start date.
  function getWindow() {
    const today  = todayISO();
    const anchor = filterStartISO || today;  // anchor is the user-chosen start date

    if (activeFilter === 'all') {
      return { start: null, end: null };
    }
    if (activeFilter === 'week') {
      return { start: anchor, end: addDays(anchor, 6) };
    }
    if (activeFilter === 'month') {
      const d = new Date(anchor + 'T00:00:00');
      const end = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      return { start: anchor, end: end.toISOString().split('T')[0] };
    }
    if (activeFilter === 'year') {
      const d = new Date(anchor + 'T00:00:00');
      return { start: anchor, end: `${d.getFullYear()}-12-31` };
    }
    if (activeFilter === 'ytd') {
      const d = new Date(anchor + 'T00:00:00');
      return { start: `${d.getFullYear()}-01-01`, end: today };
    }
    return { start: null, end: null };
  }

  function filterExpenses() {
    const { start, end } = getWindow();
    if (!start && !end) return expenses;
    return expenses.filter(e => {
      if (start && e.date < start) return false;
      if (end   && e.date > end)   return false;
      return true;
    });
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const visible = filterExpenses();
    const total   = visible.reduce((s, e) => s + e.amount, 0);
    const isOver  = target > 0 && total > target;
    const color     = isOver ? '#f87171' : '#4ade80';
    const colorFill = isOver ? 'rgba(248,113,113,0.08)' : 'rgba(74,222,128,0.08)';

    // Total
    const totalEl = document.getElementById('totalDisplay');
    totalEl.textContent = '$' + total.toFixed(2);
    totalEl.className   = 'amount ' + (isOver ? 'over' : 'under');

    // Expense list
    const list = document.getElementById('expenseList');
    list.innerHTML = '';
    if (visible.length === 0) {
      list.innerHTML = '<li style="color:#475569;font-size:0.85rem;">No expenses in this range.</li>';
    } else {
      [...visible]
        .sort((a, b) => a.date.localeCompare(b.date))
        .forEach(exp => {
          const li = document.createElement('li');
          li.innerHTML = `
            <span class="date-lbl">${fmtDate(exp.date)}</span>
            <span class="desc">${escHtml(exp.desc)}</span>
            <span class="amt">-$${exp.amount.toFixed(2)}</span>
            <button class="del-btn" onclick="deleteExpense('${exp.id}')" title="Remove">✕</button>`;
          list.appendChild(li);
        });
    }

    // Chart
    const emptyState = document.getElementById('emptyState');
    if (visible.length === 0) {
      chart.data.labels = [];
      chart.data.datasets[0].data = [];
      if (chart.data.datasets.length > 1) chart.data.datasets.splice(1);
      emptyState.style.display = 'flex';
      chart.update();
      return;
    }

    emptyState.style.display = 'none';

    // Group by date
    const byDate = {};
    visible.forEach(e => { byDate[e.date] = (byDate[e.date] || 0) + e.amount; });
    const dates = Object.keys(byDate).sort();

    let running = 0;
    const cumulative = dates.map(d => { running += byDate[d]; return running; });

    chart.data.labels = dates.map(fmtDate);
    chart.data.datasets[0].data = cumulative;
    chart.data.datasets[0].borderColor = color;
    chart.data.datasets[0].backgroundColor = colorFill;
    chart.data.datasets[0].pointBackgroundColor = color;

    // Target line
    if (chart.data.datasets.length > 1) chart.data.datasets.splice(1);
    if (target > 0) {
      chart.data.datasets.push({
        label: 'Target',
        data: dates.map(() => target),
        borderColor: '#fbbf24',
        borderWidth: 1.5,
        borderDash: [6, 4],
        pointRadius: 0,
        fill: false,
        tension: 0,
      });
    }

    chart.update();
  }

  // ── Filter actions ─────────────────────────────────────────────────────────
  function applyFilter(mode) {
    activeFilter = mode;

    // For preset filters, auto-compute the start date
    const today = todayISO();
    if (mode === 'week') {
      filterStartISO = addDays(today, -6);
    } else if (mode === 'month') {
      const d = new Date();
      filterStartISO = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}-01`;
    } else if (mode === 'year') {
      filterStartISO = `${new Date().getFullYear()}-01-01`;
    } else if (mode === 'ytd') {
      filterStartISO = `${new Date().getFullYear()}-01-01`;
    } else {
      filterStartISO = '';
    }

    // Sync date picker to computed start
    document.getElementById('filterStart').value = filterStartISO;

    // Update button highlights
    ['all','week','month','year','ytd'].forEach(k => {
      document.getElementById('btn-' + k).classList.toggle('active', k === mode);
    });

    render();
  }

  function onStartDateChange() {
    const val = document.getElementById('filterStart').value;
    filterStartISO = val || '';
    // If user manually picks a date while a preset is active, keep the preset
    // mode but use the new start date. If 'all' was active, switch to a neutral
    // custom state (treat like 'year' window from that date).
    if (activeFilter === 'all' && filterStartISO) {
      // don't auto-switch; just filter from start date with no end.
      // We'll treat 'all' + start date as "from start date to infinity".
    }
    render();
  }

  // ── Actions ────────────────────────────────────────────────────────────────
  function addExpense() {
    const desc   = document.getElementById('desc').value.trim();
    const amount = parseFloat(document.getElementById('amount').value);
    const date   = document.getElementById('expDate').value;

    if (!desc)                return alert('Please enter a description.');
    if (!amount || amount <= 0) return alert('Please enter a valid amount.');
    if (!date)                return alert('Please select a date.');

    expenses.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2),
      desc, amount, date
    });
    save();
    render();

    document.getElementById('desc').value   = '';
    document.getElementById('amount').value = '';
  }

  function deleteExpense(id) {
    expenses = expenses.filter(e => e.id !== id);
    save();
    render();
  }

  function setTarget() {
    const val = parseFloat(document.getElementById('targetInput').value);
    target = (!val || val <= 0) ? 0 : val;
    save();
    const el = document.getElementById('targetDisplay');
    el.innerHTML = target > 0
      ? 'Target: <strong>$' + target.toFixed(2) + '</strong>'
      : 'No target set.';
    render();
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  document.getElementById('expDate').value = todayISO();

  if (target > 0) {
    document.getElementById('targetInput').value = target;
    document.getElementById('targetDisplay').innerHTML =
      'Target: <strong>$' + target.toFixed(2) + '</strong>';
  }

  render();
</script>
</body>
</html>
