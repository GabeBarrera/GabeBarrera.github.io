<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>USB Drive — Schematic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0f1e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #7ec8e3;
    overflow: hidden;
    user-select: none;
  }

  #hint {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 2px;
    color: #3a6b7e;
    text-transform: uppercase;
  }

  #scene {
    perspective: 900px;
    width: 420px;
    height: 280px;
    cursor: grab;
  }
  #scene:active { cursor: grabbing; }

  #usb-group {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateY(0deg) rotateX(-12deg);
    transition: transform 0.05s linear;
  }

  /* ── faces ── */
  .face {
    position: absolute;
    border: 1.5px solid #1e4d6b;
    box-shadow: inset 0 0 20px rgba(30,100,160,0.15), 0 0 6px rgba(30,130,200,0.2);
  }

  /* FRONT */
  #f-front {
    width: 340px; height: 120px;
    left: 40px; top: 80px;
    background: #060d1c;
    transform: translateZ(24px);
    border-color: #2a7faa;
  }

  /* BACK */
  #f-back {
    width: 340px; height: 120px;
    left: 40px; top: 80px;
    background: #050b18;
    transform: translateZ(-24px) rotateY(180deg);
    border-color: #1a5070;
  }

  /* TOP */
  #f-top {
    width: 340px; height: 48px;
    left: 40px; top: 56px;
    background: #070e1f;
    transform: rotateX(90deg) translateZ(24px);
    border-color: #1e5878;
  }

  /* BOTTOM */
  #f-bottom {
    width: 340px; height: 48px;
    left: 40px; top: 176px;
    background: #070e1f;
    transform: rotateX(-90deg) translateZ(24px);
    border-color: #1e5878;
  }

  /* LEFT (cap end) */
  #f-left {
    width: 48px; height: 120px;
    left: 16px; top: 80px;
    background: #060d1c;
    transform: rotateY(-90deg) translateZ(24px);
    border-color: #2a7faa;
  }

  /* RIGHT (connector end) */
  #f-right {
    width: 48px; height: 120px;
    left: 356px; top: 80px;
    background: #060d1c;
    transform: rotateY(90deg) translateZ(24px);
    border-color: #2a7faa;
  }

  /* USB connector block */
  #connector {
    position: absolute;
    width: 56px; height: 70px;
    left: 380px; top: 105px;
    background: #07111f;
    border: 1.5px solid #2a7faa;
    transform: translateZ(18px);
    transition: opacity 0.3s;
  }
  #connector-inner {
    position: absolute;
    width: 40px; height: 56px;
    left: 8px; top: 7px;
    border: 1px solid #1a5070;
    background: #030810;
  }

  /* ── Front face SVG content ── */
  #front-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* ── Internals overlay ── */
  #internals {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(5, 10, 20, 0.92);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    z-index: 100;
  }
  #internals.open {
    opacity: 1;
    pointer-events: all;
  }

  #internals-svg {
    width: min(92vw, 760px);
    height: auto;
  }

  #close-btn {
    position: fixed;
    top: 24px; right: 28px;
    background: none;
    border: 1px solid #2a7faa;
    color: #7ec8e3;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    display: none;
  }
  #close-btn:hover { background: rgba(42,127,170,0.2); }
  #internals.open ~ #close-btn { display: block; }

  .schematic-label {
    font-size: 9px;
    fill: #3a7a9c;
    letter-spacing: 1.5px;
    font-family: 'Courier New', monospace;
  }
  .leader { stroke: #2a5a72; stroke-width: 0.6; }
  .dim-line { stroke: #1e4560; stroke-width: 0.5; stroke-dasharray: 2 2; }
  .comp-border { stroke: #2a7faa; stroke-width: 1; fill: #070e1f; }
  .comp-fill { fill: #060c1a; }
  .grid-line { stroke: #0d1e2e; stroke-width: 0.5; }
  .trace { stroke: #1a5070; stroke-width: 1; fill: none; }
  .trace-hot { stroke: #2a8faa; stroke-width: 1.2; fill: none; }
  .via { fill: #1a5070; }
  .via-hot { fill: #2a8faa; }
  .silk { fill: #4aa8c8; font-family: 'Courier New', monospace; }
  .silk-line { stroke: #4aa8c8; stroke-width: 0.8; fill: none; }
</style>
</head>
<body>

<div id="hint">DRAG TO ROTATE &nbsp;·&nbsp; DOUBLE-CLICK TO INSPECT</div>

<div id="scene">
  <div id="usb-group">

    <div class="face" id="f-front">

    <div class="face" id="f-back"></div>

<button id="close-btn" onclick="closeInternals()">&#x2715; CLOSE</button>

<script>
  const scene   = document.getElementById('scene');
  const group   = document.getElementById('usb-group');
  const overlay = document.getElementById('internals');

  let rotY = -28, rotX = -12;
  let dragging = false, lastX = 0, lastY = 0;
  let dragMoved = false;

  scene.addEventListener('mousedown', e => {
    dragging  = true;
    dragMoved = false;
    lastX = e.clientX;
    lastY = e.clientY;
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    const dx = e.clientX - lastX;
    const dy = e.clientY - lastY;
    if (Math.abs(dx) + Math.abs(dy) > 2) dragMoved = true;
    rotY += dx * 0.55;
    rotX -= dy * 0.35;
    rotX = Math.max(-40, Math.min(40, rotX));
    group.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
    lastX = e.clientX;
    lastY = e.clientY;
  });

  window.addEventListener('mouseup', () => { dragging = false; });

  // Touch support
  let lastTX = 0, lastTY = 0, tapTime = 0;
  scene.addEventListener('touchstart', e => {
    const t = e.touches[0];
    lastTX = t.clientX; lastTY = t.clientY;
    dragMoved = false;
    const now = Date.now();
    if (now - tapTime < 350) openInternals();
    tapTime = now;
    e.preventDefault();
  }, { passive: false });

  scene.addEventListener('touchmove', e => {
    const t = e.touches[0];
    const dx = t.clientX - lastTX;
    const dy = t.clientY - lastTY;
    dragMoved = true;
    rotY += dx * 0.55;
    rotX -= dy * 0.35;
    rotX = Math.max(-40, Math.min(40, rotX));
    group.style.transform = `rotateY(${rotY}deg) rotateX(${rotX}deg)`;
    lastTX = t.clientX; lastTY = t.clientY;
    e.preventDefault();
  }, { passive: false });

  scene.addEventListener('dblclick', e => {
    if (!dragMoved) openInternals();
  });

  function openInternals() {
    overlay.classList.add('open');
  }

  function closeInternals() {
    overlay.classList.remove('open');
  }

  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeInternals();
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeInternals();
  });
</script>
